name: Auto Fix Vulnerabilities

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  fix-vulnerabilities:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.actor == 'dependabot[bot]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Force fix vulnerabilities
        run: |
          npm audit fix --force

      - name: Create Pull Request with fixes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "security: auto-fix vulnerabilities via npm audit"
          title: "Security: Automated dependency updates"
          body: "This is an automated PR generated by GitHub Actions to resolve pending dependency alerts."
          branch: "automation/dependabot-autofix"
          delete-branch: true
